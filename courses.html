<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>課程介紹｜虎甲自然</title>
  <meta name="description" content="山野成長、自然探索、原野觀察三大系列課程，依年齡與經驗選擇適合的班級。">
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/img/logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&display=swap">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <main>
    <!-- Page Hero -->
    <section class="container section section--tight">
      <div class="section-heading">
        <h1 data-cfg="courses_hero_title">課程介紹</h1>
        <p class="muted" data-cfg="courses_hero_subtitle">點班級卡片看完整課程細節</p>
      </div>
      <div class="series-anchors" data-series-anchors></div>
    </section>

    <!-- 系列分區（程式從 series + classes 表動態生成） -->
    <div data-series-sections>
      <section class="container section">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </section>
    </div>

    <!-- 課程行事曆 -->
    <section class="container section">
      <div class="section-heading">
        <h2 data-cfg="courses_calendar_heading">課程行事曆</h2>
        <p data-cfg="courses_calendar_subtitle">依月份折疊，點開看當月各班級日期</p>
      </div>
      <div data-calendar>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
    </section>

    <!-- 底部 CTA -->
    <section class="container section text-center">
      <h2 data-cfg="courses_cta_heading">想多了解某個班級？</h2>
      <p class="muted" style="margin-bottom:32px;" data-cfg="courses_cta_text">加入 LINE 與我們聯繫，或下載完整簡章。</p>
      <div class="hero__cta">
        <a id="line-cta" href="#" target="_blank" rel="noopener" class="btn btn--accent btn--lg" data-cfg="courses_cta_line_btn">加 LINE 諮詢</a>
        <a href="info.html#download" class="btn btn--secondary btn--lg" data-cfg="courses_cta_download_btn">下載簡章</a>
      </div>
    </section>
  </main>

  <script src="assets/js/site-config.js"></script>
  <script src="assets/js/csv.js"></script>
  <script src="assets/js/shared.js"></script>
  <script src="assets/js/courses.js"></script>
</body>
</html>
