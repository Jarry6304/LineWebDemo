<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>課程資訊｜虎甲自然 2026</title>
  <meta name="description" content="山野成長、自然探索、原野觀察三大系列課程，依年齡與經驗選擇適合的班級。">
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&display=swap">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <main>
    <!-- Page Hero -->
    <section class="container section section--tight">
      <div class="section-heading">
        <h1>2026 課程資訊</h1>
        <p class="muted">點班級卡片看完整課程細節</p>
      </div>

      <!-- 系列導覽 -->
      <div class="series-anchors">
        <a href="#mountain" class="btn btn--secondary btn--lg">山野成長</a>
        <a href="#nature" class="btn btn--secondary btn--lg">自然探索</a>
        <a href="#field" class="btn btn--secondary btn--lg">原野觀察</a>
      </div>
    </section>

    <!-- 山野成長 -->
    <section id="mountain" class="container section">
      <div class="section-heading">
        <h2>山野成長系列</h2>
        <p>戶外自主行動 · 4 人成班 · 每月一次 · 五個月為一期</p>
      </div>
      <div class="stack" data-class-list="山野成長">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
    </section>

    <!-- 自然探索 -->
    <section id="nature" class="container section">
      <div class="section-heading">
        <h2>自然探索系列</h2>
        <p>親子自然共學 · 3 個家庭成班 · 兩月一次 · 六個月為一期</p>
      </div>
      <div class="stack" data-class-list="自然探索">
        <div class="skeleton skeleton-card"></div>
      </div>
    </section>

    <!-- 原野觀察 -->
    <section id="field" class="container section">
      <div class="section-heading">
        <h2>原野觀察教室</h2>
        <p>森林修補紀實 · 6 人成班 · 每月一次 · 五個月為一期</p>
      </div>
      <div class="stack" data-class-list="原野觀察">
        <div class="skeleton skeleton-card"></div>
      </div>
    </section>

    <!-- 課程行事曆 -->
    <section class="container section">
      <div class="section-heading">
        <h2>課程行事曆</h2>
        <p>依月份折疊，點開看當月各班級日期</p>
      </div>
      <div data-calendar>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
    </section>

    <!-- 底部 CTA -->
    <section class="container section text-center">
      <h2>找到適合的班級了嗎？</h2>
      <p class="muted" style="margin-bottom:32px;">早鳥優惠至 2026/06/30，享 5% 折扣</p>
      <a href="register.html" class="btn btn--primary btn--lg" style="min-width:240px;">前往報名</a>
    </section>
  </main>

  <script src="assets/js/csv.js"></script>
  <script src="assets/js/shared.js"></script>
  <script src="assets/js/courses.js"></script>
</body>
</html>
