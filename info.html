<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>相關問題｜虎甲自然</title>
  <meta name="description" content="常見問題、退費規定、個資聲明、聯絡方式與簡章下載。">
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/img/logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&display=swap">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <main>
    <!-- Page Hero -->
    <section class="container section section--tight">
      <div class="section-heading">
        <h1 data-cfg="info_hero_title">相關問題</h1>
        <p class="muted" data-cfg="info_hero_subtitle">常見問題、退費規定、個資聲明、聯絡與簡章下載</p>
      </div>
    </section>

    <!-- FAQ -->
    <section id="faq" class="container section">
      <h2 style="margin-bottom:24px;" data-cfg="info_faq_heading">常見問題</h2>
      <div data-faq-list>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
    </section>

    <!-- 退費規定 -->
    <section id="refund" class="container section">
      <h2 style="margin-bottom:16px;" data-cfg="info_refund_heading">退費規定</h2>
      <p data-cfg="info_refund_intro">本課程為系列課程，為保障師生權益與保險辦理，依開課日與退費階段不同有對應比例。</p>
      <details class="disclosure">
        <summary data-cfg="info_refund_summary">查看完整退費規定（4 階段）</summary>
        <div class="disclosure__body">
          <table class="refund-table">
            <thead>
              <tr>
                <th data-cfg="info_refund_col_time">退費時間</th>
                <th data-cfg="info_refund_col_ratio">退費比例</th>
              </tr>
            </thead>
            <tbody data-refund-rows>
              <tr><td colspan="2" class="muted">載入中…</td></tr>
            </tbody>
          </table>
          <p class="small muted" style="margin-top:16px;" data-cfg="info_refund_note">行政院公告天災或其他不可抗力因素取消，將另行協議補課日期。</p>
        </div>
      </details>
    </section>

    <!-- 個資聲明 -->
    <section id="privacy" class="container section">
      <h2 style="margin-bottom:16px;" data-cfg="info_privacy_heading">個人資料保護聲明</h2>
      <p data-cfg="info_privacy_intro">我們蒐集的個資僅供課程聯繫、保險投保及緊急聯絡使用，絕不提供給第三方。</p>
      <details class="disclosure">
        <summary data-cfg="info_privacy_summary">查看完整聲明</summary>
        <div class="disclosure__body" data-privacy-list>
          <div class="skeleton skeleton-card"></div>
        </div>
      </details>
    </section>

    <!-- 聯絡我們 -->
    <section id="contact" class="container section">
      <h2 style="margin-bottom:24px;" data-cfg="info_contact_heading">聯絡我們</h2>
      <div class="stack">
        <a id="line-cta" href="#" target="_blank" rel="noopener" class="btn btn--accent btn--lg btn--block">
          <span data-cfg="info_contact_line_btn">回到 LINE</span> <span data-line-id></span>
        </a>
        <a id="email-cta" href="#" class="btn btn--secondary btn--lg btn--block">
          <span data-cfg="info_contact_email_btn">來信詢問</span> <span data-email></span>
        </a>
      </div>
    </section>

    <!-- PDF 下載 -->
    <section id="download" class="container section">
      <h2 style="margin-bottom:24px;" data-cfg="info_download_heading">檔案下載</h2>
      <a id="pdf-card" href="#" target="_blank" rel="noopener" class="pdf-card">
        <div>
          <p class="pdf-card__title" data-cfg="info_pdf_title">虎甲自然完整簡章 PDF</p>
          <p class="pdf-card__hint" data-cfg="info_pdf_hint">完整版本，可分享給其他家長</p>
        </div>
      </a>
    </section>
  </main>

  <script src="assets/js/site-config.js"></script>
  <script src="assets/js/csv.js"></script>
  <script src="assets/js/shared.js"></script>
  <script src="assets/js/info.js"></script>
</body>
</html>
